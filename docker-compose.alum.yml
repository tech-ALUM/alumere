services:
  app:
    build: .
    container_name: alumere
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - PROJECTS_DIR=/app/data/projects
    volumes:
      - alumere-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      alum_web:
        aliases:
          - alumere
    restart: unless-stopped
volumes:
  alumere-data:
networks:
  alum_web:
    external: true
