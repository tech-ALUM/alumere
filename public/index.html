<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alumère — Progetti</title>
<script>/* apply the saved app theme before first paint (auto = follow the system) */
try{var t=localStorage.getItem("alumere.appTheme");if(t==="dark"||t==="light")document.documentElement.dataset.appTheme=t}catch(e){}</script>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="home-body">
  <header class="topbar">
    <div class="brand">
      <span class="logo">∑</span>
      <span class="name">Alum<span class="thin">ère</span></span>
      <span class="tag">draft</span>
    </div>
    <div class="toolbar">
      <div class="menu" id="settingsMenu">
        <button id="settingsBtn" class="btn" title="Impostazioni (aspetto)" aria-haspopup="true">⚙</button>
        <div class="menu-pop" hidden>
          <label>Aspetto
            <select id="appTheme" title="Tema chiaro/scuro dell'interfaccia">
              <option value="auto" selected>Auto (sistema)</option>
              <option value="light">Chiaro</option>
              <option value="dark">Scuro</option>
            </select>
          </label>
        </div>
      </div>
      <span id="archStatus" class="status idle"></span>
    </div>
  </header>

  <div class="home">
    <aside class="home-side">
      <input id="zipInput" type="file" accept=".zip,application/zip" hidden />
      <div class="menu newproj" id="newProjMenu">
        <button id="newProjBtn" class="btn primary block" aria-haspopup="true">
          <span class="ic">＋</span> Nuovo progetto <span class="caret">▾</span>
        </button>
        <div class="menu-pop" hidden>
          <button class="menu-item" id="npEmpty"><span class="menu-ic">📄</span> Progetto vuoto</button>
          <button class="menu-item" id="npTemplate" disabled title="Presto — prima scriviamo i template">
            <span class="menu-ic">📐</span> Da template <span class="soon">presto</span>
          </button>
          <button class="menu-item" id="npUpload"><span class="menu-ic">⬆</span> Carica progetto (.zip)</button>
        </div>
      </div>

      <nav class="side-nav" id="sideNav">
        <button class="side-item active" data-view="all">
          <span class="side-ic">🗂</span> Tutti i progetti
          <span class="side-count" id="countAll"></span>
        </button>
        <button class="side-item" data-view="archived">
          <span class="side-ic">🗄</span> Archiviati
          <span class="side-count" id="countArch"></span>
        </button>
      </nav>
      <div class="side-tags" id="sideTags"></div>
    </aside>

    <main class="home-main">
      <div class="home-main-head">
        <h1 id="viewTitle">Tutti i progetti</h1>
        <div class="search">
          <span class="search-ic">🔎</span>
          <input id="search" type="search" placeholder="Cerca progetto…" autocomplete="off" spellcheck="false" />
        </div>
      </div>

      <div id="list" class="proj-list">
        <div class="proj-list-head">
          <span class="c-title">Titolo</span>
          <span class="c-owner">Proprietario</span>
          <span class="c-mod">Ultima modifica</span>
          <span class="c-actions">Azioni</span>
        </div>
        <div id="rows"></div>
      </div>

      <div id="empty" class="proj-empty hidden">
        <p>Nessun progetto ancora.</p>
        <p class="muted">Crea un <b>nuovo progetto</b> o carica un archivio <b>.zip</b> di un progetto LaTeX.</p>
      </div>
      <div id="listFoot" class="list-foot"></div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="theme.js"></script>
  <script src="archive.js"></script>
</body>
</html>
