<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alumère — Projects</title>
<script>/* apply the saved app theme before first paint (auto = follow the system) */
try{var t=localStorage.getItem("alumere.appTheme");if(t==="dark"||t==="light")document.documentElement.dataset.appTheme=t}catch(e){}</script>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="home-body">
  <header class="topbar">
    <div class="brand">
      <span class="logo">∑</span>
      <span class="name">Alum<span class="thin">ère</span></span>
      <span class="tag">draft</span>
    </div>
    <div class="toolbar">
      <div class="menu" id="settingsMenu">
        <button id="settingsBtn" class="btn" title="Settings (appearance)" aria-haspopup="true">⚙</button>
        <div class="menu-pop" hidden>
          <label>Appearance
            <select id="appTheme" title="Light/dark theme of the interface">
              <option value="auto" selected>Auto (system)</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
        </div>
      </div>
      <span id="archStatus" class="status idle"></span>
    </div>
  </header>

  <div class="home">
    <aside class="home-side">
      <input id="zipInput" type="file" accept=".zip,application/zip" hidden />
      <div class="menu newproj" id="newProjMenu">
        <button id="newProjBtn" class="btn primary block" aria-haspopup="true">
          <span class="ic">＋</span> New project <span class="caret">▾</span>
        </button>
        <div class="menu-pop" hidden>
          <button class="menu-item" id="npEmpty"><span class="menu-ic">📄</span> Empty project</button>
          <button class="menu-item" id="npTemplate" disabled title="Soon — we'll write the templates first">
            <span class="menu-ic">📐</span> From template <span class="soon">soon</span>
          </button>
          <button class="menu-item" id="npUpload"><span class="menu-ic">⬆</span> Upload project (.zip)</button>
        </div>
      </div>

      <nav class="side-nav" id="sideNav">
        <button class="side-item active" data-view="all">
          <span class="side-ic">🗂</span> All projects
          <span class="side-count" id="countAll"></span>
        </button>
        <button class="side-item" data-view="archived">
          <span class="side-ic">🗄</span> Archived
          <span class="side-count" id="countArch"></span>
        </button>
      </nav>
      <div class="side-tags" id="sideTags"></div>
    </aside>

    <main class="home-main">
      <div class="home-main-head">
        <h1 id="viewTitle">All projects</h1>
        <div class="search">
          <span class="search-ic">🔎</span>
          <input id="search" type="search" placeholder="Search project…" autocomplete="off" spellcheck="false" />
        </div>
      </div>

      <div id="list" class="proj-list">
        <div class="proj-list-head">
          <span class="c-title">Title</span>
          <span class="c-owner">Owner</span>
          <span class="c-mod">Last modified</span>
          <span class="c-actions">Actions</span>
        </div>
        <div id="rows"></div>
      </div>

      <div id="empty" class="proj-empty hidden">
        <p>No projects yet.</p>
        <p class="muted">Create a <b>new project</b> or upload a <b>.zip</b> archive of a LaTeX project.</p>
      </div>
      <div id="listFoot" class="list-foot"></div>
    </main>
  </div>

  <script src="auth.js"></script>
  <script src="theme.js"></script>
  <script src="archive.js"></script>
</body>
</html>
