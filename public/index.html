<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alumère — Progetti</title>
<script>/* apply the saved app theme before first paint (auto = follow the system) */
try{var t=localStorage.getItem("alumere.appTheme");if(t==="dark"||t==="light")document.documentElement.dataset.appTheme=t}catch(e){}</script>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="archive-body">
  <header class="topbar">
    <div class="brand">
      <span class="logo">∑</span>
      <span class="name">Alum<span class="thin">ère</span></span>
      <span class="tag">draft</span>
    </div>
    <div class="toolbar">
      <input id="zipInput" type="file" accept=".zip,application/zip" hidden />
      <button id="newProjBtn" class="btn primary"><span class="ic">＋</span> Nuovo progetto</button>
      <button id="uploadBtn" class="btn" title="Crea un progetto da un archivio .zip esistente"><span class="ic">⬆</span> Carica .zip</button>
      <span id="archStatus" class="status idle"></span>
    </div>
  </header>

  <main class="archive">
    <div class="archive-head">
      <h1>Progetti</h1>
      <p class="sub">Libreria condivisa — i progetti restano sul server, disponibili a tutti.</p>
    </div>
    <div id="grid" class="proj-grid"></div>
    <div id="empty" class="proj-empty hidden">
      <p>Nessun progetto ancora.</p>
      <p class="muted">Crea un <b>nuovo progetto</b> o carica un archivio <b>.zip</b> di un progetto LaTeX.</p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script src="archive.js"></script>
</body>
</html>
